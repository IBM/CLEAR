# Example configuration for agentic pipelines
# Copy and modify this file for your use case

# ============================================================================
# SHARED: All Pipelines
# ============================================================================

data_dir: ../data/log_monitor_agent
results_dir: ../output/analysis_results

# Set to true if input contains raw traces that need preprocessing
from_raw_traces: true
agent_framework: langgraph
observability_framework: mlflow
separate_tools: false

overwrite: true
max_workers: 10
run_name: my_experiment

# Model Configuration
inference_backend: litellm
endpoint_url: null
provider: openai
eval_model_name: gpt-4o
eval_model_params:
  temperature: 0.0
  max_tokens: 8096

# ============================================================================
# STEP-BY-STEP + UNIFIED
# ============================================================================

evaluation_criteria: null
predefined_issues: null

# ============================================================================
# TRAJECTORY + UNIFIED
# ============================================================================

eval_types:
  - full_trajectory
  - rubric

generate_rubrics: true
clear_analysis_types:
  - issues

# ============================================================================
# UNIFIED ONLY
# ============================================================================

run_step_by_step: true
run_full_trajectory: true
