# Agentic pipeline configuration
traces_input_dir: ../data/log_monitor_agent       # For run_clear_pipeline.py (full pipeline from raw traces)
agentic_output_dir: ../output/mlflow_log_monitor_example
agent_framework: langgraph
separate_tools: false
overwrite: true

# CLEAR evaluation configuration
# Uses LiteLLM - see https://docs.litellm.ai/docs/providers for model naming

# inference params
provider: openai
eval_model_name: gpt-4o  # LiteLLM model name (e.g., gpt-4o, claude-3-opus, gemini/gemini-pro)
eval_model_params:
  temperature: 0.0  # Default for deterministic evaluation
  max_tokens: 8096

#use cached results if available
resume_enabled: false

# dict {criteria_name: criteria_desc}, specific
evaluation_criteria: null

# Pass/fail analysis
success_threshold: 0.7  # Threshold for pass/fail determination
pass_criteria: avg      # "avg" or "min" - which score to compare against threshold

# unique run_ identifier (to appear in file name)
run_name: null