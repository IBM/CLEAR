# Agentic pipeline configuration
traces_input_dir: null       # For run_clear_pipeline.py (full pipeline from raw traces)
traces_data_dir: null        # For run_clear_on_traj_data.py (from preprocessed trajectory data)
agentic_output_dir: null
observability_framework: mlflow
separate_tools: false
overwrite: true
memory_only: false           # If true, use temp directories and return only JSON results (no files saved)

# CLEAR evaluation configuration

# inference params
# Choose inference backend: "langchain" (default), "litellm", or "endpoint"
# - inference_backend: "langchain" (default) - Use LangChain for built-in providers
# - inference_backend: "litellm" - Use LiteLLM (supports many providers: anthropic, bedrock, groq, etc.)
#   See https://docs.litellm.ai/docs/providers for full list
# - inference_backend: "endpoint" - Use direct HTTP endpoint backend for custom APIs
inference_backend: litellm # or langchain, endpoint
inference_url: null # required for inference_backend endpoint
provider: watsonx
eval_model_name: openai/gpt-oss-120b
max_workers: 20
eval_model_params:
  temperature: 0.0  # Default for deterministic evaluation
  max_tokens: 8096


# dict {criteria_name: criteria_desc}, to be embedded in the prompt of the llm judge.
# These criteria will not be used directly, but will affect the discovered issues
# Example for agentic workflows (3 reasoning + 2 tool-related):
# evaluation_criteria:
#   reasoning_clarity: "Agent provides clear step-by-step reasoning for decisions"
#   reasoning_correctness: "Agent's logical reasoning is sound and leads to correct conclusions"
#   tool_selection: "Agent selects appropriate tools for the given task"
evaluation_criteria: null

# list of predefined issues (strings) to be mapped to the individual records.
# if this parameter is set, no issue discovery will be performed.
# Example for agentic workflows (3 reasoning + 2 tool-related):
# predefined_issues:
#   - "Incomplete reasoning - jumps to conclusions without considering alternatives"
#   - "Flawed logical reasoning leading to incorrect decisions"
#   - "Incorrect tool selection for the task requirements"
#   - "Wrong output format"
predefined_issues: null

## internal clear params
#use cached results if available
resume_enabled: false

max_examples_to_analyze: null # for debugging

# Threshold for issue analysis: records with score >= this are excluded from issue synthesis
high_score_threshold: 0.9

# Pass/fail analysis thresholds
success_threshold: 0.7  # Threshold for pass/fail determination
pass_criteria: avg      # "avg" or "min" - which score to compare against threshold

# unique run_ identifier (to appear in file name)
run_name: null

# External judge configuration (only used when task is "external")
# Path to Python file containing external judge function
external_judge_path: null
# Name of the function to call in the external judge file (default: "evaluate")
external_judge_function: evaluate
# Additional configuration passed to the external judge
external_judge_config: {}


# whether to perform generation or take existing ones from data
perform_generation: false

# whether to use reference in the evaluations.
is_reference_based: false


use_general_prompt: true
perform_clustering: true

#general, rag, math
task: general

question_column: question
model_output_column: response
reference_column: ground_truth # required when is_reference_based is true
model_input_column: model_input # optional
qid_column: id # optional
documents_column: documents # required for rag

use_full_text_for_analysis: false
#max_workers: 20
max_shortcomings: 15
min_shortcomings: 3
max_eval_text_for_synthesis: 1000

# agentic params:

agent_mode: true
input_columns:
  - agent_name
  - Name
  - intent
  - task_id
  - step_in_trace_general
  - step_in_trace_node
  - id
  - traj_score