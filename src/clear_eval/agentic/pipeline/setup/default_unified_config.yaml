# ============================================================================
# UNIFIED AGENTIC PIPELINE CONFIGURATION
# ============================================================================

# ----------------------------------------------------------------------------
# Pipeline Execution Mode
# ----------------------------------------------------------------------------
run_step_by_step: true          # Run step-by-step CLEAR analysis
run_full_trajectory: true       # Run full trajectory evaluation

# ----------------------------------------------------------------------------
# Agentic Pipeline Input/Output (distinct from CLEAR's data-path/output-dir)
# ----------------------------------------------------------------------------
agentic_input_dir: null         # REQUIRED: Base input directory with the input
agentic_output_dir: null        # REQUIRED: Base output directory
                                # results will be kept in: agentic_output_dir/clear_results/<run-name>/

# ----------------------------------------------------------------------------
# Step-by-Step Pipeline Options
# ----------------------------------------------------------------------------
from_raw_traces: false       # If true, process from raw traces; else expect the processed csvs in the input directory
agent_framework: langgraph      # langgraph | crewai (only if from_raw_traces=true)
observability_framework: langfuse # mlflow | langfuse (only if from_raw_traces=true)
separate_tools: false           # Separate tool calls from text responses (keep false for now)

# ----------------------------------------------------------------------------
# Full Trajectory Pipeline Options
# ----------------------------------------------------------------------------
eval_types:                     # Evaluations to run
  #- task_success
  - full_trajectory
  - rubric
generate_rubrics: true         # Generate rubrics before evaluation
rubric_dir: null                # Path to existing rubrics (if not generating)
clear_analysis_types:           # CLEAR analyses to run on full trajectory results
  #- root_cause                  # Analyze task_success failures
  - issues                      # Analyze full_trajectory issues

# ----------------------------------------------------------------------------
# Execution Control
# ----------------------------------------------------------------------------
overwrite: true                 # Overwrite existing results
concurrency: 10                 # Number of parallel workers
max_files: null                 # Limit files to process (for testing)
context_tokens: null            # Model context window; if set, long trajectories are truncated to avoid inference errors

# ----------------------------------------------------------------------------
# CLEAR Configuration (all standard CLEAR arguments)
# ----------------------------------------------------------------------------
inference_backend: litellm
provider: openai
eval_model_name: gpt-4o
eval_model_params:
  temperature: 0.0
  max_tokens: 8096

run_name: test_unified

# dict {criteria_name: criteria_desc}, to be embedded in the prompt of the llm judge.
# These criteria will not be used directly, but will affect the discovered issues
# Example for agentic workflows (3 reasoning + 2 tool-related):
# evaluation_criteria:
#   reasoning_clarity: "Agent provides clear step-by-step reasoning for decisions"
#   reasoning_correctness: "Agent's logical reasoning is sound and leads to correct conclusions"
#   tool_selection: "Agent selects appropriate tools for the given task"
evaluation_criteria: null

# list of predefined issues (strings) to be mapped to the individual records.
# if this parameter is set, no issue discovery will be performed.
# Example for agentic workflows (3 reasoning + 2 tool-related):
# predefined_issues:
#   - "Incomplete reasoning - jumps to conclusions without considering alternatives"
#   - "Flawed logical reasoning leading to incorrect decisions"
#   - "Incorrect tool selection for the task requirements"
#   - "Wrong output format"
predefined_issues: null


# CLEAR analysis settings: don't change
perform_generation: false
resume_enabled: false
high_score_threshold: 0.9
max_examples_to_analyze: null
max_shortcomings: 15
min_shortcomings: 3
max_eval_text_for_synthesis: 1000

# Pass/fail analysis
success_threshold: 0.7
pass_criteria: avg              # "avg" or "min"

# Agent mode configuration
agent_mode: true
input_columns:
  - agent_name
  - Name
  - intent
  - task_id
  - step_in_trace_general
  - step_in_trace_node
  - id
  - traj_score

# Additional CLEAR settings
is_reference_based: false
use_general_prompt: true
perform_clustering: true
task: general
question_column: question
model_output_column: response
reference_column: ground_truth
model_input_column: model_input
qid_column: id
documents_column: documents
use_full_text_for_analysis: false

