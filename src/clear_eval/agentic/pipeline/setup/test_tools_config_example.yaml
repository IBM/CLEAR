########################
### Modify as needed ###
########################
data_dir: "" #  required: data dir with intermediate representation csvs
results_dir: "" #  required
overwrite: true
max_workers: 10
run_name: my_experiment
from_raw_traces: false # true for process from traces, false for process from intermediate representation

# separate_tools:
# false (default): combined mode — one evaluation per LLM call
# true: tools_with_reasoning — one evaluation per tool call (SPARC),
#       reasoning text appended to each tool row's model_input
separate_tools: false

# Model Configuration
inference_backend: litellm
endpoint_url: null
provider: openai
eval_model_name: gpt-4o
eval_model_params:
  temperature: 0.0
  max_tokens: 8096

# keep as is
run_step_by_step: true
run_full_trajectory: false
memory_only: false
gen_model_name: none